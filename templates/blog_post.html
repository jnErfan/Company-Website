{% extends "base.html" %}

{% block title %}{{ post.title }} - Blog{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <h1>{{ post.title }}</h1>
                <div class="mb-3">
                    <small class="text-muted">By {{ post.author }} on {{ post.date_posted.strftime('%B %d, %Y') }}</small>
                </div>
                <div class="blog-content">{{ post.content | safe }}</div>
                <hr>
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('main.blog') }}" class="btn btn-outline-secondary">&larr; Back to Blog</a>
                    <div class="share-buttons">
                        <span class="me-2">Share:</span>
                        <a href="#" class="text-muted me-2"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="text-muted me-2"><i class="bi bi-twitter"></i></a>
                        <a href="#" class="text-muted"><i class="bi bi-linkedin"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
